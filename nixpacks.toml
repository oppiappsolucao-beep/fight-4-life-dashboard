# Deploy Node (API + front) no EasyPanel via Nixpacks.
providers = ["node"]

[variables]
NODE_ENV = "production"
HOST = "0.0.0.0"
WEB_DIST_PATH = "apps/web/dist"
DATABASE_URL = "postgresql://build:build@127.0.0.1:5432/build?schema=public"
DIRECT_URL = "postgresql://build:build@127.0.0.1:5432/build?schema=public"

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]
aptPkgs = ["openssl"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npm run db:generate -w @oppi/api",
  "npm run build -w @oppi/web",
  "npm run build -w @oppi/api"
]

# db:push + catálogo de exercícios rodam no startup (bootstrapDatabase em index.ts)

# node direto = PID 1 (evita SIGTERM estranho com npm)
[start]
cmd = "node apps/api/dist/index.js"
